syntax = "proto3";

package account;

import "account/account.proto";

message CreateTransactionRequest {
  string name = 1;
  double price = 2;
  EventTag tag = 3;
  string user_id = 4;
  string address = 5;
}

message TransactionResponse {
  string id = 1;
  string name = 2;
  double price = 3;
  EventTag tag = 4;
  string user_id = 5;
  string created_at = 6;
}

message ListTransactionsRequest {
  string user_id = 1;
}

message ListTransactionsResponse {
  repeated TransactionResponse transactions = 1;
}
