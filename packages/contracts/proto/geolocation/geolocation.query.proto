syntax = "proto3";

package geolocation;

message GetNearbyTransactionsRequest {
  double latitude = 1;
  double longitude = 2;
  double radiusKm = 3;
  string tag = 4;
}

message GetMapZonesRequest {
  double latitude = 1;
  double longitude = 2;
  double radiusKm = 3;
  string tag = 4;
}

message MapZone {
  string id = 1;
  double latitude = 2;
  double longitude = 3;
  int32 weight = 4;
  int32 radius = 5;
  string tag = 6;
}

message GetMapZonesResponse {
  repeated MapZone zones = 1;
}
