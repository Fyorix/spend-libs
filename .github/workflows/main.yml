name: Publish Package to npmjs
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

  list-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set-matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          PACKAGES=$(ls -d packages/*/ | xargs -I {} sh -c 'if [ -f {}/package.json ]; then basename {}; fi' | jq -R . | jq -s -c .)
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT

  publish:
    needs: [quality, list-packages]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: spend-libs-secrets
    strategy:
      matrix:
        package: ${{ fromJson(needs.list-packages.outputs.packages) }}
    steps:
      - name: Enable Corepack
        shell: bash
        run: corepack enable
      
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          registry-url: 'https://registry.npmjs.org'
          
      - run: yarn 
      
      - name: Setup npm authentication
        run: | 
          echo "npmAuthToken: \"$NODE_AUTH_TOKEN\"" > ./.yarnrc.yml
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          
      - name: Resolve workspace dependencies
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const pkgsDir = 'packages';
          const pkgs = fs.readdirSync(pkgsDir).filter(f => fs.statSync(path.join(pkgsDir, f)).isDirectory() && fs.existsSync(path.join(pkgsDir, f, 'package.json')));
          const versions = {};
          pkgs.forEach(p => {
            const pj = JSON.parse(fs.readFileSync(path.join(pkgsDir, p, 'package.json'), 'utf8'));
            versions[pj.name] = pj.version;
          });
          pkgs.forEach(p => {
            const pjPath = path.join(pkgsDir, p, 'package.json');
            let content = fs.readFileSync(pjPath, 'utf8');
            Object.entries(versions).forEach(([name, ver]) => {
              const regex = new RegExp('\"' + name + '\":\\s*\"workspace:\\*\"', 'g');
              content = content.replace(regex, '\"' + name + '\": \"^' + ver + '\"');
            });
            fs.writeFileSync(pjPath, content);
          });
          "

      - name: Publish package
        run: |
          cd packages/${{ matrix.package }}
          yarn npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}



