name: Publish Package to npmjs
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  # changes:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v5
  #     - uses: dorny/paths-filter@v3
  #       id: filter
  #       with: 
  #         filters: |
  #           shared: 'packages/shared/**'

  quality:
    # needs: changes
    # if: ${{ needs.changes.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # matrix:
      #   package: ${{ fromJson(needs.changes.outputs.packages) }}

    steps:
      - name: 'Setup Node & Yarn'
        description: 'Sets up Node.js with a specific version and enables Corepack for Yarn'

        inputs:
          node-version:
            description: 'Version of Node.js to use'
            required: false
            default: '24.14.0'
          cache:
            description: 'Used to specify a package manager for caching in the default directory'
            required: false
            default: 'yarn'

        runs:
          using: 'composite'
          steps:
            - name: Enable Corepack
              shell: bash
              run: corepack enable

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: ${{ inputs.node-version }}
                cache: ${{ inputs.cache }}

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build # ${{ matrix.package }}
        run: yarn workspace @spend-app/lib/${{ matrix.package }} build

      - name: Lint # ${{ matrix.package }}
        run: yarn workspace @spend-app/lib/${{ matrix.package }} lint

      - name: Test # ${{ matrix.package }}
        run: yarn workspace @spend-app/lib/${{ matrix.package }} test

  publish:
    needs: quality # [changes, quality]
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
        # Setup .npmrc file to publish to npm
        - uses: actions/setup-node@v5
          with:
            node-version: '24.14.0'
            registry-url: 'https://registry.npmjs.org'
            # Defaults to the user or organization that owns the workflow file
            scope: '@spend-app'
        - run: yarn
        - run: yarn npm publish --access public
          env:
            NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
